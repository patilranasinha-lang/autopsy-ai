version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:////app/data/autopsy.db
    volumes:
      - autopsy_data:/app/data
    networks:
      - autopsy-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - autopsy-network

volumes:
  autopsy_data:
    description: Persistent volume for SQLite and vector store

networks:
  autopsy-network:
    driver: bridge
